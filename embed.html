<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scramjet Embed</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
}
#proxyFrame{
  width:100%;
  height:100%;
  border:none;
  background:#000;
}
</style>
</head>

<body>
<iframe id="proxyFrame" allowfullscreen></iframe>

<script src="/baremux/index.js" defer></script>
<script src="/uv/uv.bundle.js" defer></script>
<script src="/uv/uv.config.js" defer></script>
<script src="/scram/scramjet.all.js" defer></script>
<script src="/stuff.js" defer></script>
<script src="frame.js"></script>
<script src="script.js"></script>

<script>
const iframe = document.getElementById("proxyFrame");

function normalize(value){
  try { return new URL(value).toString(); } catch {}
  try {
    const url = new URL("http://" + value);
    if (url.hostname.includes(".")) return url.toString();
  } catch {}
  return "https://duckduckgo.com/?q=" + encodeURIComponent(value);
}

function getTarget(){
  if(!location.hash) return "https://google.com/";
  try{
    const decoded = decodeURIComponent(location.hash.substring(1));
    if(decoded && decoded.trim()){
      return normalize(decoded);
    }
  }catch{}
  return "https://google.com/";
}

function loadFromHash(){
  const target = getTarget();
  iframe.src = "/scramjet/" + target;
}

window.addEventListener("load", loadFromHash);
window.addEventListener("hashchange", loadFromHash);
</script>

</body>
</html>
