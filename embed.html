<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scramjet Embed</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
  margin:0;
  padding:0;
  height:100%;
  width:100%;
  background:#000;
  overflow:hidden;
}
#proxyFrame{
  width:100%;
  height:100%;
  border:none;
  background:#000;
}
</style>
</head>

<body>
<iframe id="proxyFrame" allowfullscreen></iframe>

<!-- Same core scripts prx.html relies on -->
<script src="/baremux/index.js" defer></script>
<script src="/scram/scramjet.all.js" defer></script>
<script src="/stuff.js" defer></script>
<script src="/frame.js"></script>

<script>
const iframe = document.getElementById("proxyFrame");

function search(value){
  try{return new URL(value).toString();}catch{}
  try{
    const url=new URL("http://"+value);
    if(url.hostname.includes("."))return url.toString();
  }catch{}
  return "https://duckduckgo.com/search?q="+encodeURIComponent(value);
}

function load(url){
  if(!url)return;
  const finalURL=search(url);
  iframe.src="/scramjet/"+finalURL;
  location.hash=encodeURIComponent(finalURL);
}

function handleHashRoute(){
  if(!location.hash){
    load("https://google.com/");
    return;
  }
  const raw=location.hash.substring(1);
  try{
    const decoded=decodeURIComponent(raw);
    if(decoded&&decoded.trim()){
      load(decoded);
    }
  }catch{
    load("https://google.com/");
  }
}

window.addEventListener("load",handleHashRoute);
window.addEventListener("hashchange",handleHashRoute);
</script>

</body>
</html>
