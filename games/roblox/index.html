<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Roblox</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --main-bg:#0f1420;
  --panel:#1b2133;
  --panel2:#232a40;
  --border:#2f3652;
  --text:#e6e9f2;
  --muted:#9aa3c7;
  --accent:#6c7cff;
}

html,body{
  margin:0;
  padding:0;
  height:100%;
  background:var(--main-bg);
  font-family:system-ui,sans-serif;
  color:var(--text);
  overflow:hidden;
}

iframe{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  border:none;
}

.popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:var(--panel);
  border:1px solid var(--border);
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:400px;
  z-index:10;
  box-shadow:0 0 40px rgba(0,0,0,0.4);
  animation:fadeIn 0.2s ease;
}

.popup h3{
  margin-top:0;
  margin-bottom:10px;
  font-weight:600;
}

.popup p{
  color:var(--muted);
  font-size:14px;
  line-height:1.4;
}

.popup a{
  color:var(--accent);
  text-decoration:none;
}

.popup a:hover{
  text-decoration:underline;
}

.popup button{
  margin-top:15px;
  width:100%;
  padding:8px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--panel2);
  color:var(--text);
  cursor:pointer;
  transition:0.2s;
}

.popup button:hover{
  border-color:var(--accent);
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  z-index:9;
  backdrop-filter:blur(4px);
}

@keyframes fadeIn{
  from{opacity:0;transform:translate(-50%,-48%);}
  to{opacity:1;transform:translate(-50%,-50%);}
}
</style>
</head>

<body>

<iframe src="/embed.html#https://velara.cc/astra/roblox"></iframe>

<div class="overlay" id="overlay"></div>

<div class="popup" id="popup">
  <h3>Credit Notice</h3>
  <p>
    Credit to <a href="https://velara.cc" target="_blank">Velara</a> for Roblox because I couldn't figure it out.
  </p>
  <button onclick="closePopup()">Got it</button>
</div>

<script>
function closePopup(){
  document.getElementById("popup").remove();
  document.getElementById("overlay").remove();
}
</script>

</body>
</html>
