<html lang="en">

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
:root {
    --bg-start: #0d1117;
    --bg-end: #161b22;
    --highlight: #ffffff;
    --panel: #1b2133;
    --panel2: #232a40;
    --border: rgba(255,255,255,0.08);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--highlight);
    padding: 20px;
}

/* Search */

.search-container {
    width: 100%;
    max-width: 560px;
    margin-bottom: 20px;
    z-index: 100;
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--panel);
}

.search-input {
    width: 100%;
    padding: 12px 20px;
    border-radius: 12px;
    border: none;
    font-size: 14px;
    background: transparent;
    color: var(--highlight);
    outline: 0;
}

.search-input::placeholder {
    color: rgba(255,255,255,0.5);
}

.search-input:focus {
    background: rgba(255,255,255,0.05);
}

.search-results {
    width: 100%;
    max-width: 560px;
    max-height: 400px;
    background: var(--panel2);
    border-radius: 12px;
    overflow-y: auto;
    opacity: 0;
    transform: translateX(-50%) translateY(-7px);
    visibility: hidden;
    transition: all .2s ease;
    z-index: 99;
    position: absolute;
    top: 75px;
    left: 50%;
    border: 1px solid var(--border);
}

.search-results.active {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    visibility: visible;
}

.result-item {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    cursor: pointer;
    transition: background .2s;
}

.result-item:hover {
    background: rgba(255,255,255,0.05);
}

.result-img {
    width: 50px;
    height: 50px;
    border-radius: 8px;
    overflow: hidden;
    margin-right: 12px;
    flex-shrink: 0;
}

.result-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.result-title {
    font-weight: 600;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 14px;
}

.result-artist {
    font-size: 12px;
    opacity: .6;
}

/* Main Layout */

.main-container {
    display: flex;
    justify-content: space-between;
    width: 100%;
    max-width: 1200px;
    margin-top: 80px;
}

/* Favorites */

.favorites-column {
    width: 35%;
    background: var(--panel);
    border-radius: 16px;
    padding: 15px;
    margin-left: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    border: 1px solid var(--border);
    max-height: 500px;
    overflow-y: auto;
}

.favorite-item:hover {
    background: rgba(255,255,255,0.05);
}

.play-favorites-btn {
    padding: 8px;
    font-size: 16px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.play-favorites-btn:hover {
    background: rgba(255,255,255,0.1);
}

/* Player */

.player {
    width: 65%;
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 25px;
    background: var(--panel);
    border-radius: 20px;
    border: 1px solid var(--border);
}

.album-art {
    flex: 0 0 250px;
    height: 250px;
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.05);
}

.album-art i {
    font-size: 120px;
    color: rgba(255,255,255,0.3);
}

.track-title {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 4px;
    max-width: 350px;
}

.artist {
    font-size: 18px;
    opacity: .6;
    margin-bottom: 20px;
}

/* Controls */

.controls i {
    font-size: 18px;
    cursor: pointer;
    opacity: .8;
    color: var(--highlight);
    padding: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.controls i:hover {
    background: rgba(255,255,255,0.12);
    opacity: 1;
}

.seekbar {
    height: 6px;
    background: rgba(255,255,255,0.15);
    border-radius: 6px;
}

#progress {
    height: 100%;
    width: 0%;
    background: var(--highlight);
    border-radius: 6px;
}

.timecodes {
    font-size: 10px;
    opacity: .6;
    margin-top: 4px;
    font-family: Inconsolata, monospace;
}

/* Lyrics */

.lyrics-toggle {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.lyrics-toggle:hover {
    background: rgba(255,255,255,0.15);
}

.lyric-line {
    color: rgba(255,255,255,0.4);
    opacity: .4;
    padding: 3px 0;
    font-size: 12px;
}

.lyric-line.active {
    color: var(--highlight);
    font-weight: 700;
    opacity: 1;
    font-size: 14px;
}

.error-message {
    color: #ff4d4d;
    text-align: center;
    margin-top: 10px;
    font-size: 12px;
}
</style>
</head>
