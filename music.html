<!doctype html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>Music | Orbit</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.7.0/fonts/remixicon.css">
        <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
        <style>
          :root {
  --bg: #0f1420;
  --panel: #1b2133;
  --panel2: #232a40;
  --text: #e6e9f2;
  --muted: #aab0c5;
  --accent: #6c7cff;
  --radius: 22px;
}

body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.main-container {
  display: flex;
  justify-content: space-between;
  width: 100%;
  max-width: 1200px;
  margin-top: 80px;
}

.favorites-column {
  width: 35%;
  background: var(--panel2);
  border-radius: var(--radius);
  padding: 15px;
  margin-left: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  border: 1px solid rgba(230, 233, 242, 0.1);
  max-height: 500px;
  overflow-y: auto;
  box-shadow: 4px 4px 1px rgba(0, 0, 0, 0.3);
}

.favorites-column::-webkit-scrollbar {
  width: 6px;
}

.favorites-column::-webkit-scrollbar-track {
  background: rgba(230, 233, 242, 0.05);
  border-radius: 3px;
}

.favorites-column::-webkit-scrollbar-thumb {
  background: rgba(230, 233, 242, 0.3);
  border-radius: 3px;
}

.favorites-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 10px;
  text-align: center;
}

.favorite-item {
  display: flex;
  flex-direction: row;
  align-items: center;
  padding: 10px;
  cursor: pointer;
  transition: background 0.2s;
}

.favorite-item:hover {
  background: rgba(230, 233, 242, 0.08);
}

.favorite-item .result-img {
  width: 40px;
  height: 40px;
  margin-right: 10px;
}

.favorite-item .result-info {
  flex: 1;
}

.favorite-item .result-title {
  font-size: 10px;
  color: var(--text);
}

.favorite-item .result-artist {
  font-size: 8px;
  color: var(--muted);
}

.favorite-item .remove-fav,
.favorite-item .skip-next,
.favorite-item .skip-prev {
  font-size: 12px;
  opacity: 0.6;
  margin-left: 5px;
  cursor: pointer;
  transition: opacity 0.2s;
  color: var(--text);
}

.favorite-item .remove-fav:hover,
.favorite-item .skip-next:hover,
.favorite-item .skip-prev:hover {
  opacity: 1;
}

.play-favorites-btn {
  padding: 8px;
  font-size: 16px;
  background: rgba(230, 233, 242, 0.08);
  border-radius: var(--radius);
  color: var(--text);
  cursor: pointer;
  text-align: center;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.play-favorites-btn:hover {
  background: rgba(230, 233, 242, 0.15);
}

.play-favorites-btn:active {
  transform: scale(0.95);
}

.player {
  width: 65%;
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 25px;
  background: var(--panel2);
  border-radius: var(--radius);
  box-shadow: 4px 4px 1px rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(230, 233, 242, 0.1);
}

.album-art {
  flex: 0 0 250px;
  height: 250px;
  border-radius: var(--radius);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(230, 233, 242, 0.08);
  position: relative;
}

.album-art i {
  font-size: 120px;
  color: rgba(230, 233, 242, 0.5);
  position: absolute;
}

.album-art img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: relative;
  z-index: 1;
}

.info {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding-left: 0;
  text-shadow: none;
  position: relative;
}

.top-icons {
  position: absolute;
  top: 0;
  right: 0;
}

.top-icons i {
  font-size: 18px;
  opacity: 0.6;
  color: var(--text);
  cursor: pointer;
  transition: opacity 0.2s;
}

.top-icons i:hover {
  opacity: 1;
}

.track-title {
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 350px;
  color: var(--text);
}

.artist {
  font-size: 18px;
  opacity: 0.75;
  margin-bottom: 20px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 350px;
  color: var(--text);
}

.controls {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  margin-bottom: 18px;
}

.control-row {
  display: flex;
  gap: 6px;
}

.controls i {
  font-size: 18px;
  cursor: pointer;
  transition: all 0.2s ease;
  opacity: 0.8;
  color: var(--text);
  padding: 10px;
  border-radius: 50%;
  background: rgba(230, 233, 242, 0.08);
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.controls i:hover {
  opacity: 1;
  background: rgba(230, 233, 242, 0.15);
}

.controls i:active {
  transform: scale(0.95);
}

.seekbar {
  height: 6px;
  background: rgba(230, 233, 242, 0.2);
  border-radius: 6px;
  position: relative;
  cursor: pointer;
  transition: height 0.2s ease;
}

.seekbar.active {
  height: 8px;
}

#progress {
  height: 100%;
  width: 0%;
  background: var(--text);
  border-radius: 3px;
}

.timecodes {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  opacity: 0.7;
  margin-top: 4px;
  color: var(--text);
  font-family: Inconsolata, monospace;
}

.lyrics-toggle {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 40px;
  height: 40px;
  background: rgba(230, 233, 242, 0.08);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  backdrop-filter: blur(5px);
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
  transition: all 0.2s ease;
  z-index: 100;
}

.lyrics-toggle:hover {
  background: rgba(230, 233, 242, 0.15);
}

.lyrics-toggle i {
  font-size: 16px;
  color: var(--text);
}

.lyrics-content {
  max-height: 250px;
  overflow-y: auto;
  text-align: left;
  white-space: pre-line;
  padding-right: 10px;
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
}

.lyric-line {
  transition: all 0.2s ease;
  color: var(--muted);
  opacity: 0.4;
  padding: 3px 0;
  margin: 3px 0;
  filter: blur(2px);
  line-height: 1.6;
  font-size: 12px;
}

.lyric-line.active {
  color: var(--text);
  font-weight: 700;
  opacity: 1;
  font-size: 14px;
  filter: blur(0px);
}

.lyric-line.next {
  color: #ccc;
  opacity: 0.7;
  filter: blur(0.6px);
}

.lyric-line.prev {
  color: #bbb;
  opacity: 0.55;
  filter: blur(1px);
}
          </style>
    </head>
