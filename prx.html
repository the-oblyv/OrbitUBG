<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Proxy | Orbit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/res/orbit.png">
<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root{
  --main-bg:#0f1420;
  --panel:#1b2133;
  --panel2:#232a40;
  --border:#2f3652;
  --text:#e6e9f2;
  --muted:#9aa3c7;
  --accent:#6c7cff;
}
html,body{
  margin:0;
  padding:0;
  height:100%;
  background:var(--main-bg);
  font-family:system-ui,sans-serif;
  color:var(--text);
  overflow:hidden;
}
#browserBar{
  position:fixed;
  top:110px;
  left:0;
  width:100%;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  padding:10px 14px;
  display:flex;
  align-items:center;
  gap:10px;
  z-index:5;
  box-sizing:border-box;
}
.nav-btn{
  background:var(--panel2);
  border:1px solid var(--border);
  color:var(--text);
  padding:8px 10px;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}
.nav-btn:hover{border-color:var(--accent);}
#urlInput{
  flex:1;
  padding:9px 14px;
  border-radius:30px;
  border:1px solid var(--border);
  outline:none;
  font-size:14px;
  background:var(--panel2);
  color:var(--text);
}
#proxyContainer{
  position:fixed;
  top:160px;
  left:0;
  width:100%;
  height:calc(100vh - 160px);
  display:flex;
  flex-direction:column;
}
#newtab{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--main-bg);
  position:relative;
}
.clock{
  display:flex;
  gap:1rem;
  font-size:4rem;
  font-weight:600;
  align-items:center;
}
.clock-section{height:5rem;overflow:hidden;}
.clock-track{transition:transform 0.5s ease;}
.clock-number{
  height:5rem;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0.2;
}
.clock-separator{opacity:0.6;}
.clock-toggle{
  position:absolute;
  bottom:40px;
  font-size:0.9rem;
  padding:0.5rem 1rem;
  background:var(--panel2);
  border:1px solid var(--border);
  border-radius:8px;
  cursor:pointer;
  color:var(--text);
  transition:0.2s;
}
.clock-toggle:hover{border-color:var(--accent);}
#proxyFrame{
  display:none;
  width:100%;
  height:100%;
  border:none;
  background:#000;
}
</style>
</head>

<body>

<header class="topbar" id="navMount"></header>
<nav class="menu" id="menu"></nav>

<div id="browserBar">
  <button class="nav-btn" id="backBtn"><i class="fa-solid fa-arrow-left"></i></button>
  <button class="nav-btn" id="forwardBtn"><i class="fa-solid fa-arrow-right"></i></button>
  <button class="nav-btn" id="refreshBtn"><i class="fa-solid fa-rotate-right"></i></button>
  <input id="urlInput" type="text" placeholder="Search or enter URL">
  <button class="nav-btn" id="devConsoleBtn"><i class="fa-solid fa-code"></i></button>
  <button class="nav-btn" id="optionsBtn"><i class="fa-solid fa-gear"></i></button>
</div>

<div id="proxyContainer">
  <div id="newtab">
    <div class="clock" id="clock"></div>
    <button class="clock-toggle" id="formatToggle">Toggle 12h / 24h</button>
  </div>
  <iframe id="proxyFrame" allowfullscreen></iframe>
</div>

<script src="/baremux/index.js" defer></script>
<script src="/uv/uv.bundle.js" defer></script>
<script src="/uv/uv.config.js" defer></script>
<script src="/scram/scramjet.all.js" defer></script>
<script src="/stuff.js" defer></script>
<script src="frame.js"></script>
<script src="script.js"></script>

<script>
const input=document.getElementById("urlInput");
const backBtn=document.getElementById("backBtn");
const forwardBtn=document.getElementById("forwardBtn");
const refreshBtn=document.getElementById("refreshBtn");
const iframe=document.getElementById("proxyFrame");
const newtab=document.getElementById("newtab");
const optionsBtn=document.getElementById("optionsBtn");
const devConsoleBtn=document.getElementById("devConsoleBtn");

let currentProxy=localStorage.getItem("orbitProxy")||"uv";
let historyStack=[];
let historyIndex=-1;

function search(value){
  try{return new URL(value).toString();}catch{}
  try{
    const url=new URL("http://"+value);
    if(url.hostname.includes("."))return url.toString();
  }catch{}
  return "https://duckduckgo.com/search?q="+encodeURIComponent(value);
}

function load(url,addHistory=true){
  if(!url)return;
  const finalURL=search(url);
  newtab.style.display="none";
  iframe.style.display="block";
  if(currentProxy==="uv"){
    iframe.src=__uv$config.prefix+__uv$config.encodeUrl(finalURL);
  }else{
    iframe.src="/scramjet/"+finalURL;
  }
  input.value=url;
  location.hash=encodeURIComponent(finalURL);
  if(addHistory){
    historyStack=historyStack.slice(0,historyIndex+1);
    historyStack.push(url);
    historyIndex++;
  }
}

function handleHashRoute(){
  if(!location.hash)return;
  const raw=location.hash.substring(1);
  try{
    const decoded=decodeURIComponent(raw);
    if(decoded&&decoded.trim()){
      input.value=decoded;
      load(decoded,false);
    }
  }catch{}
}

window.addEventListener("load",handleHashRoute);
window.addEventListener("hashchange",handleHashRoute);

input.addEventListener("keydown",e=>{
  if(e.key==="Enter")load(input.value);
});

backBtn.onclick=()=>{
  if(historyIndex>0){
    historyIndex--;
    load(historyStack[historyIndex],false);
  }
};

forwardBtn.onclick=()=>{
  if(historyIndex<historyStack.length-1){
    historyIndex++;
    load(historyStack[historyIndex],false);
  }
};

refreshBtn.onclick=()=>{
  if(historyIndex>=0)load(historyStack[historyIndex],false);
};

optionsBtn.onclick = () => {
  const menu = document.createElement("div");
  menu.style.position = "fixed";
  menu.style.top = "170px";
  menu.style.right = "20px";
  menu.style.background = "var(--panel)";
  menu.style.border = "1px solid var(--border)";
  menu.style.padding = "12px";
  menu.style.borderRadius = "10px";
  menu.style.zIndex = "9999";
  menu.innerHTML = `
    <div style="margin-bottom:8px;font-weight:600;">Orbit Settings</div>
    <button id="switchProxy" style="width:100%;margin-bottom:6px;">Switch Proxy</button>
    <button id="closeMenu" style="width:100%;">Close</button>
  `;
  document.body.appendChild(menu);

  document.getElementById("switchProxy").onclick = () => {
    currentProxy = currentProxy === "uv" ? "scramjet" : "uv";
    localStorage.setItem("orbitProxy", currentProxy);
    alert("Switched to " + currentProxy);
  };

  document.getElementById("closeMenu").onclick = () => {
    menu.remove();
  };
};
  
devConsoleBtn.onclick = () => {
  if (!iframe.src) return;

  try {
    const script = document.createElement("script");
    script.src = "https://cdn.jsdelivr.net/gh/SnowLord7/devconsole@master/main.js";
    script.onload = () => console.log("Dev console loaded");
    
    iframe.contentWindow.document.body.appendChild(script);
  } catch (err) {
    alert("Dev console injection blocked by site.");
  }
};
  
const clock=document.getElementById("clock");
const toggleBtn=document.getElementById("formatToggle");
let is12Hour=localStorage.getItem("orbitClockFormat")==="12";

function createColumn(max){
  const section=document.createElement("div");
  section.className="clock-section";
  const track=document.createElement("div");
  track.className="clock-track";
  for(let i=0;i<max;i++){
    const num=document.createElement("div");
    num.className="clock-number";
    num.textContent=i.toString().padStart(2,"0");
    track.appendChild(num);
  }
  section.appendChild(track);
  clock.appendChild(section);
  return track;
}

const hourTrack=createColumn(24);
const minuteTrack=createColumn(60);
const secondTrack=createColumn(60);

function updateClock(){
  const now=new Date();
  let hours=now.getHours();
  const minutes=now.getMinutes();
  const seconds=now.getSeconds();
  if(is12Hour)hours=hours%12||12;
  hourTrack.style.transform=`translateY(-${hours*5}rem)`;
  minuteTrack.style.transform=`translateY(-${minutes*5}rem)`;
  secondTrack.style.transform=`translateY(-${seconds*5}rem)`;
}

setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
