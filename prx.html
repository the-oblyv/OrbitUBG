<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Proxy | Orbit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/res/orbit.png">
<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root{
  --main-bg:#0f1420;
  --panel:#1b2133;
  --panel2:#232a40;
  --border:#2f3652;
  --text:#e6e9f2;
  --muted:#9aa3c7;
  --accent:#6c7cff;
}
html,body{
  margin:0;
  padding:0;
  height:100%;
  background:var(--main-bg);
  font-family:system-ui,sans-serif;
  color:var(--text);
  overflow:hidden;
}
#browserBar{
  position:fixed;
  top:110px;
  left:0;
  width:100%;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  padding:10px 14px;
  display:flex;
  align-items:center;
  gap:10px;
  z-index:5;
  box-sizing:border-box;
}
.nav-btn{
  background:var(--panel2);
  border:1px solid var(--border);
  color:var(--text);
  padding:8px 10px;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}
.nav-btn:hover{border-color:var(--accent);}
#urlInput{
  flex:1;
  padding:9px 14px;
  border-radius:30px;
  border:1px solid var(--border);
  outline:none;
  font-size:14px;
  background:var(--panel2);
  color:var(--text);
}
#proxyContainer{
  position:fixed;
  top:160px;
  left:0;
  width:100%;
  height:calc(100vh - 160px);
  display:flex;
  flex-direction:column;
}
#newtab{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--main-bg);
  position:relative;
}
.clock{
  display:flex;
  gap:1rem;
  font-size:4rem;
  font-weight:600;
  align-items:center;
}
.clock-section{height:5rem;overflow:hidden;}
.clock-track{transition:transform 0.5s ease;}
.clock-number{
  height:5rem;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0.2;
}
.clock-separator{opacity:0.6;}
.clock-toggle{
  position:absolute;
  bottom:40px;
  font-size:0.9rem;
  padding:0.5rem 1rem;
  background:var(--panel2);
  border:1px solid var(--border);
  border-radius:8px;
  cursor:pointer;
  color:var(--text);
  transition:0.2s;
}
.clock-toggle:hover{border-color:var(--accent);}
#proxyFrame{
  display:none;
  width:100%;
  height:100%;
  border:none;
  background:#000;
}
#optionsModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(6px);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
}
#optionsPanel{
  width:420px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  padding:24px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
.option-group{margin-bottom:20px;}
.proxy-buttons{display:flex;gap:10px;}
.proxy-btn{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--panel2);
  color:var(--text);
  cursor:pointer;
}
.proxy-btn.active{
  border-color:var(--accent);
  box-shadow:0 0 0 2px rgba(108,124,255,0.25);
}
textarea{
  width:100%;
  height:100px;
  background:var(--panel2);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px;
  color:var(--text);
  resize:none;
  margin-bottom:10px;
}
#runJS,#closeOptions{
  padding:8px 12px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--panel2);
  color:var(--text);
  cursor:pointer;
}
</style>
</head>

<body>

<header class="topbar" id="navMount"></header>
<nav class="menu" id="menu"></nav>

<div id="browserBar">
  <button class="nav-btn" id="backBtn"><i class="fa-solid fa-arrow-left"></i></button>
  <button class="nav-btn" id="forwardBtn"><i class="fa-solid fa-arrow-right"></i></button>
  <button class="nav-btn" id="refreshBtn"><i class="fa-solid fa-rotate-right"></i></button>
  <input id="urlInput" type="text" placeholder="Search or enter URL">
  <button class="nav-btn" id="optionsBtn"><i class="fa-solid fa-gear"></i></button>
</div>

<div id="proxyContainer">
  <div id="newtab">
    <div class="clock" id="clock"></div>
    <button class="clock-toggle" id="formatToggle">Toggle 12h / 24h</button>
  </div>
  <iframe id="proxyFrame" allowfullscreen></iframe>
</div>

<div id="optionsModal">
  <div id="optionsPanel">
    <h2>Options</h2>
    <div class="option-group">
      <h3>Proxy</h3>
      <div class="proxy-buttons">
        <button class="proxy-btn" data-proxy="uv">Ultraviolet</button>
        <button class="proxy-btn" data-proxy="scramjet">Scramjet</button>
      </div>
    </div>
    <div class="option-group">
      <h3>Eval JS</h3>
      <textarea id="jsEvalBox"></textarea>
      <button id="runJS">Execute</button>
    </div>
    <button id="closeOptions">Close</button>
  </div>
</div>

<script src="/baremux/index.js" defer></script>
<script src="/uv/uv.bundle.js" defer></script>
<script src="/uv/uv.config.js" defer></script>
<script src="/scram/scramjet.all.js" defer></script>
<script src="/stuff.js" defer></script>
<script src="frame.js"></script>
<script src="script.js"></script>

<script>
const input=document.getElementById("urlInput");
const backBtn=document.getElementById("backBtn");
const forwardBtn=document.getElementById("forwardBtn");
const refreshBtn=document.getElementById("refreshBtn");
const iframe=document.getElementById("proxyFrame");
const newtab=document.getElementById("newtab");
const optionsBtn=document.getElementById("optionsBtn");
const optionsModal=document.getElementById("optionsModal");
const closeOptions=document.getElementById("closeOptions");
const proxyButtons=document.querySelectorAll(".proxy-btn");
const runJS=document.getElementById("runJS");
const jsEvalBox=document.getElementById("jsEvalBox");

let currentProxy=localStorage.getItem("orbitProxy")||"uv";
let historyStack=[];
let historyIndex=-1;

function search(value){
  try{return new URL(value).toString();}catch{}
  try{
    const url=new URL("http://"+value);
    if(url.hostname.includes("."))return url.toString();
  }catch{}
  return "https://www.google.com/search?q="+encodeURIComponent(value);
}

function load(url,addHistory=true){
  if(!url)return;
  const finalURL=search(url);
  newtab.style.display="none";
  iframe.style.display="block";
  if(currentProxy==="uv"){
    iframe.src=__uv$config.prefix+__uv$config.encodeUrl(finalURL);
  }else{
    iframe.src="/scramjet/"+finalURL;
  }
  input.value=url;
  if(addHistory){
    historyStack=historyStack.slice(0,historyIndex+1);
    historyStack.push(url);
    historyIndex++;
  }
}

input.addEventListener("keydown",e=>{
  if(e.key==="Enter")load(input.value);
});

backBtn.onclick=()=>{
  if(historyIndex>0){
    historyIndex--;
    load(historyStack[historyIndex],false);
  }
};

forwardBtn.onclick=()=>{
  if(historyIndex<historyStack.length-1){
    historyIndex++;
    load(historyStack[historyIndex],false);
  }
};

refreshBtn.onclick=()=>{
  if(historyIndex>=0)load(historyStack[historyIndex],false);
};

optionsBtn.onclick=()=>optionsModal.style.display="flex";
closeOptions.onclick=()=>optionsModal.style.display="none";
optionsModal.onclick=e=>{
  if(e.target===optionsModal)optionsModal.style.display="none";
};

proxyButtons.forEach(btn=>{
  btn.classList.toggle("active",btn.dataset.proxy===currentProxy);
  btn.onclick=()=>{
    currentProxy=btn.dataset.proxy;
    localStorage.setItem("orbitProxy",currentProxy);
    proxyButtons.forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  };
});

runJS.onclick=()=>{
  const code=jsEvalBox.value.trim();
  if(!code||!iframe.contentWindow)return;
  try{iframe.contentWindow.eval(code);}catch{}
};

const clock=document.getElementById("clock");
const toggleBtn=document.getElementById("formatToggle");
let is12Hour=localStorage.getItem("orbitClockFormat")==="12";

function createColumn(max){
  const section=document.createElement("div");
  section.className="clock-section";
  const track=document.createElement("div");
  track.className="clock-track";
  for(let i=0;i<max;i++){
    const num=document.createElement("div");
    num.className="clock-number";
    num.textContent=i.toString().padStart(2,"0");
    track.appendChild(num);
  }
  section.appendChild(track);
  clock.appendChild(section);
  return track;
}

const hourTrack=createColumn(24);
const minuteTrack=createColumn(60);
const secondTrack=createColumn(60);

function updateClock(){
  const now=new Date();
  let hours=now.getHours();
  const minutes=now.getMinutes();
  const seconds=now.getSeconds();
  if(is12Hour)hours=hours%12||12;
  hourTrack.style.transform=`translateY(-${hours*5}rem)`;
  minuteTrack.style.transform=`translateY(-${minutes*5}rem)`;
  secondTrack.style.transform=`translateY(-${seconds*5}rem)`;
}

setInterval(updateClock,1000);
updateClock();

const sep1=document.createElement("div");
sep1.className="clock-separator";
sep1.textContent=":";
clock.insertBefore(sep1,clock.children[1]);

const sep2=document.createElement("div");
sep2.className="clock-separator";
sep2.textContent=":";
clock.insertBefore(sep2,clock.children[3]);

toggleBtn.onclick=()=>{
  is12Hour=!is12Hour;
  localStorage.setItem("orbitClockFormat",is12Hour?"12":"24");
  location.reload();
};

  function handleHashRoute() {
  if (!location.hash) return;

  const raw = location.hash.substring(1);
  try {
    const decoded = decodeURIComponent(raw);

    if (decoded && decoded.trim()) {
      input.value = decoded;
      load(decoded);
    }
  } catch (err) {
    console.warn("Invalid hash URL");
  }
}

window.addEventListener("load", handleHashRoute);

window.addEventListener("hashchange", handleHashRoute);
</script>

</body>
</html>
